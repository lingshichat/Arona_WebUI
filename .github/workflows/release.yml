name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: npm ci --production

      - name: Package release archives
        run: |
          VERSION="${GITHUB_REF_NAME}"
          STAGING="arona-webui-${VERSION}"

          mkdir "$STAGING"
          cp -r src public node_modules "$STAGING/"
          cp package.json package-lock.json start.bat start.sh .env.example README.md LICENSE Dockerfile docker-compose.yml .dockerignore "$STAGING/" 2>/dev/null || true
          cp -r scripts "$STAGING/" 2>/dev/null || true
          chmod +x "$STAGING/start.sh" "$STAGING/scripts/install.sh" 2>/dev/null || true

          zip -r "arona-webui-${VERSION}.zip" "$STAGING"
          tar czf "arona-webui-${VERSION}.tar.gz" "$STAGING"

          # Fixed-name aliases so README curl commands always work
          cp "arona-webui-${VERSION}.zip" "arona-webui-latest.zip"
          cp "arona-webui-${VERSION}.tar.gz" "arona-webui-latest.tar.gz"

      - name: Build release notes
        shell: bash
        run: |
          CURRENT_TAG="${GITHUB_REF_NAME}"
          PREV_TAG="$(git tag --sort=-version:refname | grep '^v' | grep -vx "${CURRENT_TAG}" | head -n1 || true)"

          cat > release-body.md <<'EOF'
          ## Quick Start / 快速开始

          **Windows**: Download `.zip` → Extract → Double-click `start.bat`

          **macOS / Linux**:
          ```bash
          curl -fsSL https://github.com/lingshichat/Arona_WebUI/releases/latest/download/arona-webui-latest.tar.gz | tar xz
          cd arona-webui-*/
          ./start.sh
          ```

          **Docker**:
          ```bash
          GATEWAY_URL=ws://your-gateway:18789 GATEWAY_PASSWORD=xxx docker compose up -d
          ```

          首次启动浏览器会自动打开配置向导，按提示填入网关地址和密码即可。

          详见 [README](https://github.com/lingshichat/Arona_WebUI#readme)。
          EOF

          RELEASE_NOTES_FILE=".github/release-notes/${CURRENT_TAG}.md"
          if [ -f "${RELEASE_NOTES_FILE}" ]; then
            {
              echo
              cat "${RELEASE_NOTES_FILE}"
              echo
            } >> release-body.md
          fi

          {
            echo
            echo "## Changelog / 更新日志"
            echo

            if [ -n "${PREV_TAG}" ]; then
              echo "Changes from \`${PREV_TAG}\` to \`${CURRENT_TAG}\`:"
            else
              echo "Changes included in \`${CURRENT_TAG}\`:"
            fi
            echo

            NOTES="$(git log --no-merges --pretty=format:'- %h %s' "${PREV_TAG:+${PREV_TAG}..}${CURRENT_TAG}" -- . ':(exclude).trellis' || true)"
            if [ -n "${NOTES}" ]; then
              printf '%s\n' "${NOTES}"
            else
              echo "- No non-.trellis commits found in this release range."
            fi
          } >> release-body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-body.md
          files: |
            arona-webui-*.zip
            arona-webui-*.tar.gz
